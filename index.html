<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tweet Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3d;
    --accent: #7c6dfa;
    --accent2: #fa6d8f;
    --text: #f0f0f8;
    --muted: #7070a0;
    --green: #4dfa9a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    color: white;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, #fff 40%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }

  .sub {
    color: var(--muted);
    font-size: 14px;
    margin-top: 6px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  textarea, input, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }

  textarea:focus, input:focus, select:focus {
    border-color: var(--accent);
  }

  textarea { min-height: 80px; }

  .vibes {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .vibe-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    color: var(--muted);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .vibe-btn.active, .vibe-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .generate-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: white;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    padding: 16px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 4px;
  }

  .generate-btn:hover { opacity: 0.9; }
  .generate-btn:active { transform: scale(0.98); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .results { display: none; }
  .results.show { display: block; }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .result-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .tweet-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 10px;
    position: relative;
  }

  .tweet-card:hover { border-color: var(--accent); }

  .tweet-text {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .tweet-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
  }

  .char-count {
    font-size: 11px;
    color: var(--muted);
  }

  .char-count.warn { color: #facc15; }
  .char-count.over { color: var(--accent2); }

  .copy-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .copy-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
  .copy-btn.copied { background: var(--green); border-color: var(--green); color: #000; }

  .loading {
    display: none;
    text-align: center;
    padding: 32px 0;
    color: var(--muted);
    font-size: 14px;
  }

  .loading.show { display: block; }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(250, 109, 143, 0.1);
    border: 1px solid rgba(250, 109, 143, 0.3);
    border-radius: 10px;
    color: var(--accent2);
    font-size: 13px;
    padding: 12px 16px;
    display: none;
  }

  .error-msg.show { display: block; }

  .count-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .count-row select { flex: 1; }

  .tip {
    background: rgba(124, 109, 250, 0.08);
    border: 1px solid rgba(124, 109, 250, 0.2);
    border-radius: 10px;
    color: var(--accent);
    font-size: 12px;
    padding: 10px 14px;
    margin-bottom: 16px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="badge">✦ AI Tweet Generator</div>
  <h1>Bikin konten X<br>yang bikin orang follow</h1>
  <p class="sub">Gaya anak muda Indonesia 2026 🇮🇩</p>
</div>

<div class="tip">
  💡 Makin spesifik topiknya, makin bagus hasilnya. Coba tulis kayak lagi ngobrol sama temen.
</div>

<div class="card">
  <label>Topik atau ide kamu</label>
  <textarea id="topicInput" placeholder="Contoh: AI makin canggih tapi justru bikin orang males mikir sendiri... atau: pengalaman kerja remote sambil nongkrong di kafe Jakarta..."></textarea>
</div>

<div class="card">
  <label>Vibe tweet</label>
  <div class="vibes">
    <button class="vibe-btn active" data-vibe="relatable">😭 Relatable</button>
    <button class="vibe-btn" data-vibe="opini">🔥 Opini Panas</button>
    <button class="vibe-btn" data-vibe="humor">💀 Humor Gelap</button>
    <button class="vibe-btn" data-vibe="insight">🧠 Insight</button>
    <button class="vibe-btn" data-vibe="story">📖 Story Time</button>
    <button class="vibe-btn" data-vibe="aesthetic">✨ Aesthetic Quotes</button>
  </div>
</div>

<div class="card">
  <label>Jumlah variasi</label>
  <div class="count-row">
    <select id="countSelect">
      <option value="3">3 variasi</option>
      <option value="5" selected>5 variasi</option>
    </select>
  </div>
</div>

<button class="generate-btn" id="genBtn" onclick="generateTweets()">
  ✦ Generate Tweet Sekarang
</button>

<div class="loading" id="loading">
  <div class="spinner"></div>
  Lagi nulis yang vibes banget...
</div>

<div class="error-msg" id="errorMsg"></div>

<div class="results" id="results">
  <div class="result-header">
    <span class="result-title">Pilih yang paling cocok 👇</span>
  </div>
  <div id="tweetList"></div>
</div>

<script>
  let selectedVibe = 'relatable';

  document.querySelectorAll('.vibe-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.vibe-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedVibe = btn.dataset.vibe;
    });
  });

  const vibeDescriptions = {
    relatable: 'sangat relatable, jujur, bikin orang ngangguk-ngangguk dan nge-RT karena ngerasa sama',
    opini: 'opini panas, berani, kontroversial tapi berdasar, bikin orang mau debat di reply',
    humor: 'humor gelap, sarkas, absurd tapi cerdas — gaya gen z Indonesia yang suka self-deprecating humor',
    insight: 'insight mendalam tapi disampaikan simpel, bikin orang merasa lebih pinter setelah baca',
    story: 'storytelling singkat tapi engaging, ada twist atau punchline di akhir, bikin orang scroll buat baca semua',
    aesthetic: 'aesthetic, poetic, quotes yang bikin orang screenshoot dan save — tapi bukan cheesy'
  };

  async function generateTweets() {
    const topic = document.getElementById('topicInput').value.trim();
    if (!topic) {
      showError('Isi dulu topiknya ya! 🙏');
      return;
    }

    const count = document.getElementById('countSelect').value;
    const vibe = selectedVibe;
    const vibeDesc = vibeDescriptions[vibe];

    setLoading(true);
    hideError();
    hideResults();

    const systemPrompt = `Kamu adalah content creator Twitter/X yang sangat populer di kalangan anak muda Indonesia tahun 2026. Kamu tahu persis cara bikin tweet yang viral, dapat banyak like, retweet, dan follower baru.

PERSONA KAMU:
- Anak muda Indonesia, gen Z, 20-27 tahun
- Tinggal di kota besar (Jakarta, Bandung, Surabaya, dll)
- Tech-savvy, update sama tren, suka kultur pop
- Ngomongnya jujur, kadang nyelekit tapi relate
- Paham slang Indonesia 2026: "ngl", "fr fr", "no cap", "fomo", "W/L", "slay", "it's giving", "bestie", "yasss", "gaskeun", "gila sih", "anjir", "mantul", "baper", dll — tapi dipakai dengan natural, BUKAN dipaksain semua masuk

CARA NULIS TWEET YANG BAGUS:
- Maksimal 280 karakter per tweet
- Pembuka yang langsung hook — jangan mulai dengan "jadi" atau "nah"
- Gunakan bahasa campur Indonesia-Inggris secara natural (seperti orang Jakarta ngomong)
- Pakai tanda baca dengan efek: "..." untuk drama, "." di akhir kalimat pendek untuk efek tegas
- Emoji boleh tapi jangan lebay — max 2-3, dan yang relevan
- JANGAN pakai hashtag
- Jangan terdengar kayak robot atau AI
- Jangan terlalu formal

VIBE YANG DIMINTA: ${vibeDesc}

PENTING:
- Hasilkan TEPAT ${count} tweet yang berbeda-beda strukturnya
- Setiap tweet harus punya angle atau framing yang berbeda dari topik yang sama
- Return HANYA JSON array, tidak ada teks lain sama sekali
- Format: ["tweet 1", "tweet 2", ...]`;

    const userPrompt = `Buat ${count} tweet dengan vibe "${vibe}" tentang topik ini: "${topic}"

Pastikan setiap tweet terasa fresh dan punya angle berbeda. Return JSON array saja.`;

    try {
      const response = await fetch('https://chat.khoirulaziz757.workers.dev/v1/chat/completions', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({
    model: '@cf/meta/llama-3-8b-instruct',
    max_tokens: 1000,
    messages: [
      { role: 'system', content: systemPrompt },
      { role: 'user', content: userPrompt }
    ]
  })
});

const data = await response.json();
const raw = data.choices?.[0]?.message?.content || '';

let tweets = [];
try {
  const clean = raw.replace(/```json|```/g, '').trim();
  tweets = JSON.parse(clean);
} catch {
  const match = raw.match(/\[[\s\S]*\]/);
  if (match) tweets = JSON.parse(match[0]);
}

if (!tweets || tweets.length === 0) throw new Error('Gagal parse hasil');

renderTweets(tweets);
    } catch (err) {
      showError('Ups, ada error nih. Coba lagi ya! 🙏');
      console.error(err);
    } finally {
      setLoading(false);
    }
  }

  function renderTweets(tweets) {
    const list = document.getElementById('tweetList');
    list.innerHTML = '';

    tweets.forEach((tweet, i) => {
      const len = tweet.length;
      const countClass = len > 280 ? 'over' : len > 240 ? 'warn' : '';

      list.innerHTML += `
        <div class="tweet-card">
          <div class="tweet-text">${escHtml(tweet)}</div>
          <div class="tweet-footer">
            <span class="char-count ${countClass}">${len}/280</span>
            <button class="copy-btn" id="copy-${i}" onclick="copyTweet(${i}, ${JSON.stringify(tweet).replace(/"/g, '&quot;')})">
              📋 Copy
            </button>
          </div>
        </div>
      `;
    });

    document.getElementById('results').classList.add('show');
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyTweet(i, text) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById(`copy-${i}`);
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '📋 Copy';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function setLoading(show) {
    document.getElementById('loading').classList.toggle('show', show);
    document.getElementById('genBtn').disabled = show;
    document.getElementById('genBtn').textContent = show ? 'Generating...' : '✦ Generate Tweet Sekarang';
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }

  function hideError() { document.getElementById('errorMsg').classList.remove('show'); }
  function hideResults() { document.getElementById('results').classList.remove('show'); }

  document.getElementById('topicInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) generateTweets();
  });
</script>
</body>
  </html>
